# Render the Quarto site (project root, outputs to docs/) and deploy
# docs/ to the gh-pages branch. The site embeds pre-generated figures and
# maps committed in output/, so CI needs Quarto only — the R pipeline
# never runs here.
#
# One-time setup after the first successful run:
#   Repo Settings -> Pages -> Source: "Deploy from a branch" -> gh-pages / root
name: Publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false

      - name: Render site
        run: quarto render

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
